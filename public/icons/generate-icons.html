<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    const sizes = [72, 96, 128, 144, 152, 192, 384, 512]

    function generateIcon(size) {
      const canvas = document.getElementById('canvas')
      canvas.width = size
      canvas.height = size
      const ctx = canvas.getContext('2d')

      // Background
      ctx.fillStyle = '#3b82f6'
      ctx.beginPath()
      ctx.roundRect(0, 0, size, size, size * 0.2)
      ctx.fill()

      // Letter "O" for OutreachHub
      const fontSize = size * 0.5
      ctx.font = `bold ${fontSize}px Arial`
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillStyle = '#ffffff'
      ctx.fillText('O', size / 2, size / 2)

      return canvas.toDataURL('image/png')
    }

    function downloadIcon(dataUrl, filename) {
      const link = document.createElement('a')
      link.download = filename
      link.href = dataUrl
      link.click()
    }

    // Generate and download all icons
    sizes.forEach(size => {
      const dataUrl = generateIcon(size)
      downloadIcon(dataUrl, `icon-${size}x${size}.png`)
    })

    alert('Icons generated! Check your downloads folder.')
  </script>
</body>
</html>
